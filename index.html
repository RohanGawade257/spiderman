<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="script.css">
    <!--acces to external img no need to download-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Spider-man</title>
</head>
<body>
    <div class="card">
        <!--NAV-->
        <nav>
            <div class="logo">
                <img src="spiderlogo.png" alt="spider-logo">

            </div>
            <div class="menu">
                <i class="fa-regular fa-user"></i>
                <span class="divider"></span>
                <span>ENG</span>
                <span class="divider"></span>
                <i class="fa-solid fa-magnifying-glass"></i>
                <span class="divider"></span>
                <i class="fa-solid fa bars"></i>
            </div>
        </nav>

        <!--left social-media-icons-->

        <div class="social">
            <a href="" class="fab fa-linkedin-in"></a>
            <a href="" class="fab fa-instagram"></a>
            <a href="" class="fab fa-youtube"></a>
        </div>

        <!--spider-img-->
        <div class="hero">
            <img src="spiderman.png" alt="spiderman">
            <div class="text">
                <h1>SPIDERMAN</h1>
            </div>
        </div>

        <!--side arrow-->
        
        <div class="side_arrow left">
            <i class="fa-solid fa-chevron-left"></i>
        </div>
        <div class="side_arrow right">
            <i class="fa-solid fa-chevron-right"></i>
        </div>

        <!--Info cards-->
        <div class="info-cards"><div class="info-card">
            <div class="info-number">01</div>
            <div class="info-text">
                <h4>Awards</h4>
                <p>Known Gloablly for Heroic Service and Protecting City. </p>
            </div>
        </div>

        <div class="info-card">
            <div class="info-number">02</div>
            <div class="info-text">
                <h4>Service</h4>
                <p>Providng Protection and Rapid Response on Threats. </p>
            </div>
        </div>

        <div class="info-card">
             <div class="info-number">03</div>
            <div class="info-text">
                <h4>Team</h4>
                <p>Growing Network of Heros Evolving With Every Misson. </p>
            </div>
        </div>
        </div>
    </div>
</body>
</html>
